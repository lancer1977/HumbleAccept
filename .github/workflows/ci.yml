name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate browser extensions
        run: bash scripts/validate.sh

      - name: Package browser extensions
        run: |
          mkdir -p artifacts
          python3 -m zipfile -c artifacts/humble-extension.zip Humble
          python3 -m zipfile -c artifacts/steam-extension.zip Steam

      - name: Upload browser extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: humbleaccept-browser-extensions
          path: artifacts/*.zip
